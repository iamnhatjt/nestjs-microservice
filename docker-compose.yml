services:
  reservations:
    build:
      context: .
      dockerfile: apps/reservations/Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - '${MYSQL_PORT}:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
